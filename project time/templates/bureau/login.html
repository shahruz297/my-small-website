<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход — Архитектурное бюро</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root, [data-theme="light"] {
      --bg: #f2f2f7;
      --card-bg: #ffffff;
      --border: #e2e2e7;
      --text-primary: #1c1c1e;
      --text-secondary: #636366;
      --accent: #0071e3;
      --danger: #ff3b30;
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.13);
    }
    [data-theme="dark"] {
      --bg: #1c1c1e;
      --card-bg: #2c2c2e;
      --border: #3a3a3c;
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --accent: #2997ff;
      --danger: #ff453a;
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.55);
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.3s;
      -webkit-font-smoothing: antialiased;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand .logo-circle {
      width: 72px; height: 72px;
      background: var(--accent);
      border-radius: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,113,227,0.35);
    }
    .login-brand h1 {
      font-size: 22px; font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.4px;
      margin-bottom: 4px;
    }
    .login-brand p {
      font-size: 13px; color: var(--text-secondary);
    }
    .login-card {
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      padding: 32px 32px 28px;
    }
    .field-group { margin-bottom: 18px; }
    .field-group label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      margin-bottom: 7px;
      text-transform: uppercase;
    }
    .field-group .input-wrap {
      position: relative;
    }
    .field-group .input-wrap .field-icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 16px;
    }
    .field-group input {
      width: 100%;
      padding: 11px 13px 11px 40px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .field-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,113,227,0.13);
    }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.22s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit;
      letter-spacing: 0.1px;
    }
    .btn-login:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,113,227,0.3); }
    .btn-login:active { transform: translateY(0); }
    .error-block {
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.25);
      color: var(--danger);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13.5px;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 18px;
    }
    .login-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    /* Theme toggle on login page (top-right) */
    .theme-btn {
      position: fixed;
      top: 18px; right: 18px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: all 0.2s;
    }
    .theme-btn:hover { transform: scale(1.1); }
  </style>
  <script>
    (function() {
      try {
        var savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <button class="theme-btn" id="theme-btn" title="Тёмный / светлый режим">🌙</button>

  <div class="login-wrap">
    <div class="login-brand">
      <div class="logo-circle">🏛</div>
      <h1>Архитектурное бюро</h1>
      <p>Система управления командой</p>
    </div>

    <div class="login-card">
      {% if error %}
      <div class="error-block">
        <i class="bi bi-exclamation-circle-fill"></i>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login/{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
        {% csrf_token %}
        <div class="field-group">
          <label for="username">Логин</label>
          <div class="input-wrap">
            <i class="bi bi-person field-icon"></i>
            <input type="text" id="username" name="username" placeholder="Введите логин" autocomplete="username" required autofocus>
          </div>
        </div>
        <div class="field-group" style="margin-bottom:24px;">
          <label for="password">Пароль</label>
          <div class="input-wrap">
            <i class="bi bi-lock field-icon"></i>
            <input type="password" id="password" name="password" placeholder="Введите пароль" autocomplete="current-password" required>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right"></i>
          Войти в систему
        </button>
      </form>
    </div>

    <div class="login-footer">
      Архитектурное бюро &copy; 2026
    </div>
  </div>

  <script>
    const html = document.documentElement;
    const btn = document.getElementById('theme-btn');
    const saved = localStorage.getItem('theme') || 'light';
    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      btn.textContent = t === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', t);
    }
    applyTheme(saved);
    btn.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>
</html>
